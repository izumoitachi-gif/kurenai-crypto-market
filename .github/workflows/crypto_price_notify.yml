name: 金融市場Bot Phase1 BTC/ETH/SOL 5分ポーリング+21RSS速報検知

on:
  # 複数cron冗長化(Late Slot対策)+workflow_runで動いてるBot完了時にも後押し発火
  # 重複排除(crypto_seen_news.json+URL dedup)で二重投稿ゼロ保証
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"      # メイン(5分間隔奇数寄り・カンマ列挙で動いてる4workflowと同記法に統一)
    - cron: "1,11,21,31,41,51 * * * *"  # 冗長1(1分から10分間隔)
    - cron: "0 */2 * * *"         # 冗長2(2時間毎の最終保険)
  workflow_dispatch: {}
  workflow_run:
    workflows: ["IC Club 5-Category News Notifier", "AIラボ 15分類 AI News Notifier"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: crypto-price-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run crypto price notifier
        env:
          MARKET_WEBHOOK_CRYPTO: ${{ secrets.MARKET_WEBHOOK_CRYPTO }}
        run: python crypto_price_poll.py

      - name: Commit updated history+seen files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto_price_history.json crypto_seen_news.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: update crypto history+seen_news"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push && break
            echo "Push retry $i"
            sleep 3
          done
